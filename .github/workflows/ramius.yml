---

name: ramius
on:
  workflow_dispatch:

jobs:

  job_setup:
    runs-on: ubuntu-latest
    steps:
      - name: retrieve ${{ github.event.repository.name }} project
        uses: actions/checkout@v5

      - id: upstream_bom
        name: retrieve and interpolate versions and tags for upstream dependencies
        run: |

          # retrieve equivalent version of coverity image latest tag
          read -r coverity_version <<< $(./utils/equate_tag_siblings "ghcr.io/mantidproject/cov-analysis-linux64:latest")
          test -n ${coverity_version} || exit 1
          echo "coverity_version=${coverity_version}" >> $GITHUB_OUTPUT

    outputs:
      coverity_version: ${{ steps.upstream_bom.outputs.coverity_version }}

  job_docker:
    runs-on: ubuntu-latest
    steps:
      - name: retrieve ${{ github.event.repository.name }} project
        uses: actions/checkout@v5

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push - github runner w/ coverity
        uses: docker/build-push-action@v6
        with:
          #push: true
          context: Linux/coverity/docker
          tags: ghcr.io/${{ github.repository_owner }}/github-runner-coverity:${{ needs.job_setup.outputs.coverity_version }}
          build-args: |
            SEMVER_TAG=${{ needs.job_setup.outputs.semver_tag }}
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
