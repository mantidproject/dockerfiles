---

name: sensai
on:
  workflow_dispatch:

jobs:

  job_docker:
    runs-on: ubuntu-latest
    steps:
      - name: retrieve ${{ github.event.repository.name }} project
        uses: actions/checkout@v5

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push - github runner w/ coverity
        uses: docker/build-push-action@v6
        with:
          context:  Linux/coverity/docker

          #tags: ghcr.io/${{ github.repository_owner }}/github-runner-coverity:${{ needs.job_setup.outputs.coverity_version }}
          tags: ghcr.io/${{ github.repository_owner }}/github-runner-coverity:${{ needs.job_setup.outputs.coverity_version }}
          secrets: |
            "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"