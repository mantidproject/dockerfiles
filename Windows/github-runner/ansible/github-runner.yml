- name: Deploy Docker-based GitHub runner for Mantid builds on Windows
  hosts: all
  vars:
    organization: mantidproject
    repository: mantid
    github_token: "{{ lookup('ansible.builtin.env', 'GITHUB_TOKEN') }}"

  pre_tasks:
    - name: Fail if github token is missing
      fail:
        msg: "GITHUB_TOKEN is not set"
      when: github_token == ""

  roles:
    - role: runner
      tags: "runner"
